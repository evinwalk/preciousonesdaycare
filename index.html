<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Precious Ones Daycare | Brooklyn, NY</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=Caveat:wght@600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sun: #F7C948;
    --sun-deep: #E8A820;
    --green: #3D8C4F;
    --green-light: #6BBF7A;
    --green-pale: #E8F5EB;
    --coral: #F4845F;
    --coral-light: #FDE8DF;
    --sky: #5BB8D4;
    --sky-light: #DFF2F9;
    --cream: #FDF8EE;
    --warm-white: #FFFDF7;
    --brown: #8B5E3C;
    --brown-light: #C49A6C;
    --text: #2C1810;
    --text-muted: #7A5C48;
    --radius: 24px;
    --radius-sm: 12px;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    overflow-x: hidden;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    33% { transform: translateY(-8px) rotate(1deg); }
    66% { transform: translateY(-4px) rotate(-1deg); }
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes slideRight {
    from { opacity: 0; transform: translateX(-30px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes bounce-subtle {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .animate-fade-up { animation: fadeUp 0.7s ease forwards; }
  .animate-scale-in { animation: scaleIn 0.6s ease forwards; }
  .float { animation: float 6s ease-in-out infinite; }
  .wiggle { animation: wiggle 3s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── ICONS ───────────────────────────────────────────────
const SunIcon = () => (
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
  </svg>
);
const StarIcon = ({size=20}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
  </svg>
);
const HeartIcon = ({size=20}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor">
    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
  </svg>
);
const PhoneIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
  </svg>
);
const MailIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
  </svg>
);
const MapPinIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
  </svg>
);
const ClockIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/>
  </svg>
);
const MenuIcon = () => (
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
);
const XIcon = () => (
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
);

// ─── DECORATIVE BLOBS ─────────────────────────────────────
const Blob = ({color, style, className=''}) => (
  <div className={className} style={{
    position:'absolute', borderRadius:'60% 40% 70% 30% / 50% 60% 40% 70%',
    background: color, ...style, zIndex:0, pointerEvents:'none'
  }}/>
);

// ─── FLOATING SHAPES ─────────────────────────────────────
const FloatingShapes = () => (
  <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:0}}>
    <div className="float" style={{position:'absolute',top:'8%',right:'12%',width:70,height:70,borderRadius:'50%',background:'var(--sun)',opacity:0.4,animationDelay:'0s'}}/>
    <div className="float" style={{position:'absolute',top:'35%',right:'5%',width:40,height:40,borderRadius:'50%',background:'var(--coral)',opacity:0.35,animationDelay:'1.5s'}}/>
    <div className="float" style={{position:'absolute',top:'60%',left:'3%',width:55,height:55,borderRadius:'50%',background:'var(--green-light)',opacity:0.3,animationDelay:'3s'}}/>
    <div className="wiggle" style={{position:'absolute',top:'15%',left:'8%',width:30,height:30,background:'var(--sky)',opacity:0.4,transform:'rotate(45deg)',animationDelay:'0.5s'}}/>
    <div className="float" style={{position:'absolute',bottom:'20%',right:'15%',width:45,height:45,borderRadius:'12px',background:'var(--sun)',opacity:0.3,transform:'rotate(20deg)',animationDelay:'2s'}}/>
    <svg style={{position:'absolute',top:'25%',left:'15%',opacity:0.15,animationDelay:'1s'}} className="float" width="50" height="50" viewBox="0 0 24 24" fill="var(--green)">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
    </svg>
  </div>
);

// ─── NAVBAR ───────────────────────────────────────────────
const Navbar = ({activeSection}) => {
  const [menuOpen, setMenuOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  const links = [
    {label:'About', href:'#about'},
    {label:'Programs', href:'#programs'},
    {label:'Gallery', href:'#gallery'},
    {label:'Calendar', href:'#calendar'},
    {label:'Contact', href:'#contact'},
  ];
  const scrollTo = (href) => {
    document.querySelector(href)?.scrollIntoView({behavior:'smooth'});
    setMenuOpen(false);
  };
  return (
    <nav style={{
      position:'fixed',top:0,left:0,right:0,zIndex:1000,
      background: scrolled ? 'rgba(253,248,238,0.96)' : 'transparent',
      backdropFilter: scrolled ? 'blur(12px)' : 'none',
      borderBottom: scrolled ? '1px solid rgba(244,132,95,0.15)' : 'none',
      transition:'all 0.4s ease',
      padding:'0 24px',
    }}>
      <div style={{maxWidth:1200,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',height:72}}>
        {/* Logo */}
        <div onClick={() => scrollTo('#hero')} style={{cursor:'pointer',display:'flex',alignItems:'center',gap:12}}>
          <div style={{
            width:44,height:44,borderRadius:'50%',
            background:'linear-gradient(135deg, var(--sun), var(--coral))',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:22,boxShadow:'0 4px 14px rgba(247,201,72,0.4)',
            flexShrink:0,
          }}>✨</div>
          <div>
            <div style={{fontFamily:'Fraunces, serif',fontWeight:700,fontSize:18,color:'var(--text)',lineHeight:1.1}}>Precious Ones</div>
            <div style={{fontFamily:'Caveat',fontSize:13,color:'var(--coral)',fontWeight:600,lineHeight:1}}>Daycare Center</div>
          </div>
        </div>
        {/* Desktop links */}
        <div style={{display:'flex',gap:8,alignItems:'center'}} className="desktop-nav">
          {links.map(l => (
            <button key={l.label} onClick={() => scrollTo(l.href)} style={{
              background:'none',border:'none',cursor:'pointer',
              fontFamily:'DM Sans',fontWeight:500,fontSize:15,
              color: 'var(--text)',padding:'8px 16px',borderRadius:100,
              transition:'all 0.2s',
            }}
            onMouseEnter={e => { e.target.style.background='var(--coral-light)'; e.target.style.color='var(--coral)'; }}
            onMouseLeave={e => { e.target.style.background='none'; e.target.style.color='var(--text)'; }}>
              {l.label}
            </button>
          ))}
          <button onClick={() => scrollTo('#contact')} style={{
            background:'linear-gradient(135deg, var(--coral), #E8674A)',
            color:'white',border:'none',borderRadius:100,
            padding:'10px 22px',fontFamily:'DM Sans',fontWeight:600,fontSize:15,
            cursor:'pointer',boxShadow:'0 4px 16px rgba(244,132,95,0.4)',
            transition:'all 0.2s',marginLeft:8,
          }}
          onMouseEnter={e => e.currentTarget.style.transform='translateY(-2px)'}
          onMouseLeave={e => e.currentTarget.style.transform='translateY(0)'}
          >Enroll Now</button>
        </div>
        {/* Mobile hamburger */}
        <button onClick={() => setMenuOpen(!menuOpen)} className="mobile-nav" style={{
          background:'none',border:'none',cursor:'pointer',color:'var(--text)',display:'none',
        }}>
          {menuOpen ? <XIcon/> : <MenuIcon/>}
        </button>
      </div>
      {/* Mobile menu */}
      {menuOpen && (
        <div style={{
          background:'var(--warm-white)',borderTop:'1px solid var(--coral-light)',
          padding:'16px 24px 24px',display:'flex',flexDirection:'column',gap:4,
        }}>
          {links.map(l => (
            <button key={l.label} onClick={() => scrollTo(l.href)} style={{
              background:'none',border:'none',cursor:'pointer',
              fontFamily:'DM Sans',fontWeight:500,fontSize:16,
              color:'var(--text)',padding:'12px 16px',borderRadius:12,
              textAlign:'left',transition:'all 0.2s',
            }}>{l.label}</button>
          ))}
          <button onClick={() => scrollTo('#contact')} style={{
            background:'linear-gradient(135deg, var(--coral), #E8674A)',
            color:'white',border:'none',borderRadius:100,
            padding:'14px',fontFamily:'DM Sans',fontWeight:600,fontSize:15,
            cursor:'pointer',marginTop:8,
          }}>Enroll Now</button>
        </div>
      )}
      <style>{`
        @media(max-width:768px){
          .desktop-nav{display:none!important;}
          .mobile-nav{display:block!important;}
        }
      `}</style>
    </nav>
  );
};

// ─── HERO ─────────────────────────────────────────────────
const Hero = () => {
  const [visible, setVisible] = useState(false);
  useEffect(() => { setTimeout(() => setVisible(true), 100); }, []);
  return (
    <section id="hero" style={{
      minHeight:'100vh',position:'relative',overflow:'hidden',
      background:'linear-gradient(160deg, var(--cream) 0%, #FEF3E2 40%, #FDE8DF 100%)',
      display:'flex',alignItems:'center',
    }}>
      {/* Background blobs */}
      <Blob color="rgba(247,201,72,0.25)" style={{top:'-10%',right:'-5%',width:500,height:500}}/>
      <Blob color="rgba(107,191,122,0.2)" style={{bottom:'-5%',left:'-8%',width:450,height:450}}/>
      <Blob color="rgba(244,132,95,0.15)" style={{top:'30%',right:'20%',width:300,height:300}}/>
      <FloatingShapes/>
      {/* Big decorative sun */}
      <div style={{
        position:'absolute',top:-80,right:-80,width:400,height:400,
        borderRadius:'50%',
        background:'radial-gradient(circle, rgba(247,201,72,0.4) 0%, transparent 70%)',
        pointerEvents:'none',
      }}/>
      <div style={{
        maxWidth:1200,margin:'0 auto',padding:'100px 40px 60px',
        position:'relative',zIndex:1,display:'grid',
        gridTemplateColumns:'1fr 1fr',gap:60,alignItems:'center',
        width:'100%',
      }}>
        {/* Text */}
        <div style={{opacity: visible ? 1 : 0, transform: visible ? 'translateY(0)' : 'translateY(40px)', transition:'all 0.8s ease'}}>
          <div style={{
            display:'inline-flex',alignItems:'center',gap:8,
            background:'var(--green-pale)',borderRadius:100,
            padding:'8px 16px',marginBottom:24,
            border:'1px solid rgba(61,140,79,0.2)',
          }}>
            <span style={{fontSize:16}}>🇯🇲</span>
            <span style={{fontFamily:'DM Sans',fontWeight:500,fontSize:14,color:'var(--green)'}}>Family-owned since 2007 · Brooklyn, NY</span>
          </div>
          <h1 style={{
            fontFamily:'Fraunces, serif',fontWeight:900,
            fontSize:'clamp(44px, 6vw, 78px)',lineHeight:1.05,
            color:'var(--text)',marginBottom:12,
          }}>
            Where Every Child<br/>
            <span style={{
              color:'var(--coral)',fontStyle:'italic',
              textShadow:'3px 3px 0 rgba(244,132,95,0.15)',
            }}>Truly Shines</span>
          </h1>
          <div style={{
            fontFamily:'Caveat',fontSize:26,color:'var(--green)',
            fontWeight:700,marginBottom:28,
            display:'flex',alignItems:'center',gap:8,
          }}>
            <span>✨</span> Nurturing with love, every single day
          </div>
          <p style={{
            fontFamily:'DM Sans',fontSize:17,color:'var(--text-muted)',
            lineHeight:1.75,marginBottom:40,maxWidth:500,
          }}>
            At Precious Ones, we believe childhood is sacred. Our experienced caregivers bring warmth, patience, and joy to every moment — raising confident, curious, and happy children.
          </p>
          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
            <button onClick={() => document.querySelector('#contact')?.scrollIntoView({behavior:'smooth'})}
              style={{
                background:'linear-gradient(135deg, var(--coral), #E8674A)',
                color:'white',border:'none',borderRadius:100,
                padding:'16px 32px',fontFamily:'DM Sans',fontWeight:600,fontSize:16,
                cursor:'pointer',boxShadow:'0 6px 24px rgba(244,132,95,0.45)',
                transition:'all 0.3s',display:'flex',alignItems:'center',gap:8,
              }}
              onMouseEnter={e => { e.currentTarget.style.transform='translateY(-3px)'; e.currentTarget.style.boxShadow='0 10px 30px rgba(244,132,95,0.5)'; }}
              onMouseLeave={e => { e.currentTarget.style.transform='translateY(0)'; e.currentTarget.style.boxShadow='0 6px 24px rgba(244,132,95,0.45)'; }}
            >
              <HeartIcon size={18}/> Schedule a Visit
            </button>
            <button onClick={() => document.querySelector('#programs')?.scrollIntoView({behavior:'smooth'})}
              style={{
                background:'white',color:'var(--text)',
                border:'2px solid rgba(44,24,16,0.12)',borderRadius:100,
                padding:'14px 30px',fontFamily:'DM Sans',fontWeight:600,fontSize:16,
                cursor:'pointer',transition:'all 0.3s',
              }}
              onMouseEnter={e => { e.currentTarget.style.borderColor='var(--coral)'; e.currentTarget.style.color='var(--coral)'; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor='rgba(44,24,16,0.12)'; e.currentTarget.style.color='var(--text)'; }}
            >
              Our Programs →
            </button>
          </div>
          {/* Stats */}
          <div style={{display:'flex',gap:32,marginTop:48,flexWrap:'wrap'}}>
            {[{n:'17+',l:'Years of Care'},{n:'100+',l:'Families Served'},{n:'5★',l:'Parent Rating'}].map(s => (
              <div key={s.l}>
                <div style={{fontFamily:'Fraunces',fontWeight:900,fontSize:32,color:'var(--coral)',lineHeight:1}}>{s.n}</div>
                <div style={{fontFamily:'DM Sans',fontSize:13,color:'var(--text-muted)',fontWeight:500,marginTop:4}}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>
        {/* Illustration Card Area */}
        <div style={{
          opacity: visible ? 1 : 0, transform: visible ? 'translateY(0)' : 'translateY(40px)',
          transition:'all 0.8s ease 0.2s',
          display:'flex',flexDirection:'column',gap:20,position:'relative',
        }}>
          {/* Main card */}
          <div className="float" style={{
            background:'white',borderRadius:32,
            boxShadow:'0 20px 60px rgba(244,132,95,0.15), 0 4px 20px rgba(0,0,0,0.06)',
            padding:32,textAlign:'center',
            border:'2px solid rgba(247,201,72,0.3)',
          }}>
            <div style={{fontSize:80,lineHeight:1,marginBottom:16}}>👶🏾🧒🏾👧🏾</div>
            <div style={{fontFamily:'Fraunces',fontWeight:700,fontSize:22,color:'var(--text)',marginBottom:8}}>
              Ages 6 weeks – 12 years
            </div>
            <div style={{fontFamily:'DM Sans',fontSize:15,color:'var(--text-muted)'}}>
              Full-day & part-time programs available
            </div>
            <div style={{
              marginTop:20,display:'flex',justifyContent:'center',gap:4,
            }}>
              {[1,2,3,4,5].map(i => (
                <span key={i} style={{color:'var(--sun)',fontSize:20}}><StarIcon size={18}/></span>
              ))}
            </div>
            <div style={{fontFamily:'Caveat',fontSize:16,color:'var(--text-muted)',marginTop:4}}>
              "Best daycare in Brooklyn!" — Parent Review
            </div>
          </div>
          {/* Two smaller cards */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <div style={{
              background:'linear-gradient(135deg, var(--sun), #F5B800)',
              borderRadius:20,padding:20,color:'var(--text)',
              boxShadow:'0 8px 24px rgba(247,201,72,0.4)',
            }}>
              <div style={{fontSize:28,marginBottom:8}}>🌱</div>
              <div style={{fontFamily:'Fraunces',fontWeight:700,fontSize:15,lineHeight:1.2}}>Learning Through Play</div>
            </div>
            <div style={{
              background:'linear-gradient(135deg, var(--green), #2D7A40)',
              borderRadius:20,padding:20,color:'white',
              boxShadow:'0 8px 24px rgba(61,140,79,0.4)',
            }}>
              <div style={{fontSize:28,marginBottom:8}}>🏠</div>
              <div style={{fontFamily:'Fraunces',fontWeight:700,fontSize:15,lineHeight:1.2}}>Safe & Loving Home</div>
            </div>
          </div>
        </div>
      </div>
      {/* Wave divider */}
      <div style={{position:'absolute',bottom:-2,left:0,right:0}}>
        <svg viewBox="0 0 1440 80" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 40C240 80 480 0 720 40C960 80 1200 0 1440 40V80H0V40Z" fill="white"/>
        </svg>
      </div>
      <style>{`
        @media(max-width:768px){
          #hero > div > div { grid-template-columns: 1fr !important; }
          #hero > div > div > div:last-child { display: none !important; }
        }
      `}</style>
    </section>
  );
};

// ─── ABOUT ────────────────────────────────────────────────
const About = () => {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if(e.isIntersecting) setVis(true); }, {threshold:0.2});
    if(ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  },[]);
  return (
    <section id="about" ref={ref} style={{background:'white',padding:'100px 40px',position:'relative',overflow:'hidden'}}>
      <Blob color="rgba(247,201,72,0.1)" style={{top:'-10%',right:'-5%',width:400,height:400}}/>
      <Blob color="rgba(107,191,122,0.1)" style={{bottom:'-10%',left:'-5%',width:350,height:350}}/>
      <div style={{maxWidth:1200,margin:'0 auto',position:'relative',zIndex:1}}>
        {/* Section label */}
        <div style={{textAlign:'center',marginBottom:16}}>
          <span style={{fontFamily:'Caveat',fontSize:20,color:'var(--coral)',fontWeight:700}}>Our Story</span>
        </div>
        <h2 style={{
          fontFamily:'Fraunces',fontWeight:900,fontSize:'clamp(36px,5vw,60px)',
          textAlign:'center',marginBottom:20,color:'var(--text)',
        }}>
          Rooted in Love,<br/><span style={{color:'var(--green)',fontStyle:'italic'}}>Grown in Brooklyn</span>
        </h2>
        <div style={{
          width:80,height:4,background:'linear-gradient(90deg,var(--sun),var(--coral))',
          borderRadius:4,margin:'0 auto 60px',
        }}/>
        <div style={{
          display:'grid',gridTemplateColumns:'1fr 1fr',gap:80,alignItems:'center',
          opacity:vis?1:0,transform:vis?'translateY(0)':'translateY(40px)',

                <div style={{fontFamily:'Fraunces',fontWeight:700,fontSize:16,color:'var(--text)'}}>Online Payments Coming Soon</div>
              </div>
              <div style={{fontFamily:'DM Sans',fontSize:14,color:'var(--text-muted)',lineHeight:1.6}}>
                Secure online tuition payments will be available soon. We'll accept all major cards and ACH bank transfers.
              </div>
            </div>
          </div>
          {/* Form */}
          <div>
            {sent ? (
              <div style={{
                textAlign:'center',padding:60,
                background:'var(--green-pale)',borderRadius:28,
              }}>
                <div style={{fontSize:60,marginBottom:20}}>🌟</div>
                <div style={{fontFamily:'Fraunces',fontWeight:700,fontSize:28,color:'var(--text)',marginBottom:12}}>We'll be in touch!</div>
                <p style={{fontFamily:'DM Sans',fontSize:16,color:'var(--text-muted)',lineHeight:1.7}}>
                  Thank you for your interest in Precious Ones Daycare. We'll reach out within 1 business day to schedule your tour.
                </p>
                <button onClick={() => setSent(false)} style={{
                  marginTop:28,background:'var(--green)',color:'white',border:'none',
                  borderRadius:100,padding:'12px 28px',fontFamily:'DM Sans',fontWeight:600,
                  fontSize:15,cursor:'pointer',
                }}>Send Another Message</button>
              </div>
            ) : (
              <div style={{
                background:'var(--cream)',borderRadius:28,padding:40,
                boxShadow:'0 4px 24px rgba(0,0,0,0.06)',
              }}>
                <div style={{fontFamily:'Fraunces',fontWeight:700,fontSize:22,color:'var(--text)',marginBottom:28}}>
                  Schedule a Tour or Enroll
                </div>
                <form onSubmit={submit}>
                  <label style={{fontFamily:'DM Sans',fontSize:14,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Parent / Guardian Name *</label>
                  <input name="name" value={form.name} onChange={handle} required placeholder="Your full name"
                    style={inputStyle}
                    onFocus={e => e.target.style.borderColor='var(--coral)'}
                    onBlur={e => e.target.style.borderColor='rgba(44,24,16,0.1)'}
                  />
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                    <div>
                      <label style={{fontFamily:'DM Sans',fontSize:14,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Email *</label>
                      <input name="email" type="email" value={form.email} onChange={handle} required placeholder="your@email.com"
                        style={{...inputStyle,marginBottom:0}}
                        onFocus={e => e.target.style.borderColor='var(--coral)'}
                        onBlur={e => e.target.style.borderColor='rgba(44,24,16,0.1)'}
                      />
                    </div>
                    <div>
                      <label style={{fontFamily:'DM Sans',fontSize:14,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Phone</label>
                      <input name="phone" value={form.phone} onChange={handle} placeholder="(718) 555-0000"
                        style={{...inputStyle,marginBottom:0}}
                        onFocus={e => e.target.style.borderColor='var(--coral)'}
                        onBlur={e => e.target.style.borderColor='rgba(44,24,16,0.1)'}
                      />
                    </div>
                  </div>
                  <div style={{marginTop:16}}>
                    <label style={{fontFamily:'DM Sans',fontSize:14,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Child's Age / Program Interest</label>
                    <select name="childAge" value={form.childAge} onChange={handle}
                      style={{...inputStyle,cursor:'pointer'}}
                      onFocus={e => e.target.style.borderColor='var(--coral)'}
                      onBlur={e => e.target.style.borderColor='rgba(44,24,16,0.1)'}
                    >
                      <option value="">Select a program...</option>
                      <option>Infant Care (6 weeks – 18 months)</option>
                      <option>Toddler Program (18 months – 3 years)</option>
                      <option>Pre-K Program (3 – 5 years)</option>
                      <option>School Age Care (5 – 12 years)</option>
                    </select>
                  </div>
                  <label style={{fontFamily:'DM Sans',fontSize:14,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Message</label>
                  <textarea name="message" value={form.message} onChange={handle}
                    placeholder="Tell us a little about your child and any questions you have..."
                    rows={4}
                    style={{...inputStyle,resize:'vertical',fontFamily:'DM Sans'}}
                    onFocus={e => e.target.style.borderColor='var(--coral)'}
                    onBlur={e => e.target.style.borderColor='rgba(44,24,16,0.1)'}
                  />
                  <button type="submit" style={{
                    width:'100%',background:'linear-gradient(135deg, var(--coral), #E8674A)',
                    color:'white',border:'none',borderRadius:14,
                    padding:'16px',fontFamily:'DM Sans',fontWeight:700,fontSize:16,
                    cursor:'pointer',boxShadow:'0 6px 24px rgba(244,132,95,0.4)',
                    transition:'all 0.3s',
                  }}
                  onMouseEnter={e => e.currentTarget.style.transform='translateY(-2px)'}
                  onMouseLeave={e => e.currentTarget.style.transform='translateY(0)'}
                  >
                    Send Message ✨
                  </button>
                </form>
              </div>
            )}
          </div>
        </div>
      </div>
      <style>{`@media(max-width:768px){ #contact > div > div:last-child > div { grid-template-columns:1fr!important; } }`}</style>
    </section>
  );
};

// ─── SCROLL TO TOP ─────────────────────────────────────────
const ScrollTop = () => {
  const [show, setShow] = useState(false);
  useEffect(() => {
    const onScroll = () => setShow(window.scrollY > 400);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  },[]);
  if(!show) return null;
  return (
    <button onClick={() => window.scrollTo({top:0,behavior:'smooth'})}
      style={{
        position:'fixed',bottom:32,right:32,zIndex:999,
        width:52,height:52,borderRadius:'50%',
        background:'linear-gradient(135deg,var(--coral),#E8674A)',
        color:'white',border:'none',cursor:'pointer',fontSize:20,
        boxShadow:'0 4px 20px rgba(244,132,95,0.5)',
        transition:'all 0.3s',
      }}
      onMouseEnter={e => e.currentTarget.style.transform='translateY(-3px)'}
      onMouseLeave={e => e.currentTarget.style.transform='translateY(0)'}
    >↑</button>
  );
};
